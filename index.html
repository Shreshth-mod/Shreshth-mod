<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shreshth Mittal - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .blob1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            right: -50px;
            animation-delay: 2s;
        }

        .blob3 {
            width: 250px;
            height: 250px;
            top: 50%;
            right: 10%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 60px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 10px 50px rgba(102, 126, 234, 0.8); }
        }

        h1 {
            color: #333;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .coming-soon-text {
            color: #764ba2;
            font-size: 1.1em;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .description {
            color: #555;
            line-height: 1.8;
            margin-bottom: 40px;
            font-size: 1em;
        }

        .contact-section {
            margin-bottom: 40px;
        }

        .contact-title {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .contact-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .contact-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .icon {
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .container {
                margin: 20px;
                padding: 30px 20px;
            }

            .subtitle {
                font-size: 1em;
            }

            .contact-links {
                flex-direction: column;
                align-items: stretch;
            }

            .contact-link {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="container">
        <div class="profile-image">👨‍💻</div>
        <h1>Shreshth Mittal</h1>
        <p class="subtitle">Software Developer & Tech Enthusiast</p>
        
        <div class="coming-soon-text">✨ PORTFOLIO COMING SOON ✨</div>
        
        <p class="description">
            My portfolio is under construction. Exciting projects and work samples coming soon!
        </p>

        <div class="contact-section">
            <div class="contact-title">Connect With Me</div>
            <div class="contact-links">
                <a href="mailto:shreshthmittal06@gmail.com" class="contact-link">
                    <span class="icon">✉️</span>
                    <span>Email</span>
                </a>
                <a href="https://www.linkedin.com/in/shreshth-mittal-432020338/" target="_blank" class="contact-link">
                    <span class="icon">💼</span>
                    <span>LinkedIn</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
